<!DOCTYPE html>
<html>
<head>
  <title>Country Guess Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌍 Guess All 197 Countries</h1>

<div id="top">
  <div id="timer">15:00</div>
  <div id="progress">0 / 197</div>
</div>

<div>
  <button id="startBtn">Start</button>
  <button id="pauseBtn">Pause</button>
  <button id="resetBtn">Reset</button>
</div>

<input id="guessInput" placeholder="Enter country" disabled>

<p id="message"></p>

<div id="map-container">
  <object id="worldMap" type="image/svg+xml" data="world.svg"></object>
</div>

<script src="script.js"></script>
</body>
</html>
